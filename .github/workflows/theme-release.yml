name: Theme Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'wp-content/themes/aqualuxe/package.json'

      - name: Install deps
        working-directory: wp-content/themes/aqualuxe
        run: npm ci || npm install

      - name: Build assets
        working-directory: wp-content/themes/aqualuxe
        run: npm run build

      - name: Package theme (zip)
        run: |
          zip -r aqualuxe-theme.zip wp-content/themes/aqualuxe \
            -x '**/node_modules/**' '**/.git/**' '**/.github/**' '**/.DS_Store' '**/Thumbs.db'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqualuxe-theme
          path: aqualuxe-theme.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: aqualuxe-theme.zip
          generate_release_notes: true