name: CI

on:
  push:
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: wp-content/themes/aqualuxe/package-lock.json

      - name: Install and build theme assets
        working-directory: wp-content/themes/aqualuxe
        run: |
          npm ci
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHPCS
        run: composer global require squizlabs/php_codesniffer:^3.9

      - name: PHP lint
        run: |
          php -v
          find wp-content/themes/aqualuxe -type f -name "*.php" -print0 | xargs -0 -n1 -P4 php -l

      - name: PHPCS
        run: $HOME/.composer/vendor/bin/phpcs -q --report=full -s --standard=wp-content/themes/aqualuxe/phpcs.xml.dist wp-content/themes/aqualuxe
