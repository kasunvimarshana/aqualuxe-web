name: CI

on:
  push:
    branches: [ dev-*, main, master ]
  pull_request:
    branches: [ dev-*, main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'wp-content/themes/aqualuxe/package.json'
      - name: Install deps
        working-directory: wp-content/themes/aqualuxe
        run: npm ci
      - name: Build assets
        working-directory: wp-content/themes/aqualuxe
        run: npm run build
      - name: PHP Lint
        run: |
          find wp-content/themes/aqualuxe -type f -name "*.php" -print0 | xargs -0 -n1 -I{} php -l {}
      - name: Install Composer deps
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Set PHPCS installed_paths
        run: vendor/bin/phpcs --config-set installed_paths vendor/wp-coding-standards/wpcs
      - name: Run PHPCS
        run: vendor/bin/phpcs -q
