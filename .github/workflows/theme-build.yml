name: Theme Build and Test
on:
  push:
    branches: [ development, main ]
  pull_request:
    branches: [ development, main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: ./wp-content/themes/aqualuxe
        run: |
          npm ci || npm install
      - name: Lint
        working-directory: ./wp-content/themes/aqualuxe
        run: npm run lint --if-present
      - name: Test
        working-directory: ./wp-content/themes/aqualuxe
        run: npm test --if-present
      - name: Build
        working-directory: ./wp-content/themes/aqualuxe
        run: npm run build
