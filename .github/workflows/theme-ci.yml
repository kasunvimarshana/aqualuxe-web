name: Theme CI

on:
  push:
    paths:
      - 'wp-content/themes/aqualuxe/**'
  pull_request:
    paths:
      - 'wp-content/themes/aqualuxe/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/themes/aqualuxe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqualuxe-assets
          path: wp-content/themes/aqualuxe/assets/dist
