name: aqualuxe-theme-build
"on":
  push:
    branches: [ dev-1.0.24 ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/themes/aqualuxe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci --no-fund --no-audit
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: aqualuxe-dist
          path: wp-content/themes/aqualuxe/assets/dist
