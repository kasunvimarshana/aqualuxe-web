<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aquaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#075985;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#aquaGradient)"/>
  
  <!-- Water ripples -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <animate attributeName="r" values="20;80;20" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="600" cy="300" r="60" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <animate attributeName="r" values="15;60;15" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Fish silhouettes -->
  <path d="M 400 250 Q 380 240 360 250 Q 380 260 400 250 L 420 245 L 415 250 L 420 255 Z" fill="rgba(255,255,255,0.8)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 50,20; 0,0" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <path d="M 500 350 Q 480 340 460 350 Q 480 360 500 350 L 520 345 L 515 350 L 520 355 Z" fill="rgba(255,255,255,0.6)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -30,-15; 0,0" dur="3.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- Brand Story Text -->
  <text x="400" y="450" text-anchor="middle" fill="white" font-family="serif" font-size="36" font-weight="bold">
    Our Brand Story
  </text>
  
  <text x="400" y="480" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="18">
    Bringing elegance to aquatic life – globally
  </text>
  
  <!-- Decorative waves -->
  <path d="M 0 500 Q 200 480 400 500 T 800 500 L 800 600 L 0 600 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M 0 520 Q 200 500 400 520 T 800 520 L 800 600 L 0 600 Z" fill="rgba(255,255,255,0.05)"/>
</svg>
