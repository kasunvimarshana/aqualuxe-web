name: CI
on:
  push:
    branches: [ dev, main, dev-* ]
  pull_request:
    branches: [ dev, main, dev-* ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Lint
        run: |
          find wp-content/themes/aqualuxe -type f -name "*.php" -print0 | xargs -0 -n1 -P 4 php -l
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'wp-content/themes/aqualuxe/package-lock.json'
      - name: Install deps
        working-directory: wp-content/themes/aqualuxe
        run: npm ci || npm install
      - name: Build assets
        working-directory: wp-content/themes/aqualuxe
        run: npm run build
      - name: Install Composer (tests)
        uses: php-actions/composer@v6
        with:
          php_version: '8.2'
          args: --working-dir=wp-content/themes/aqualuxe install --no-interaction --no-progress
      - name: Run PHPUnit
        working-directory: wp-content/themes/aqualuxe
        run: vendor/bin/phpunit
