# Redis Configuration for AquaLuxe
port 6379
bind 0.0.0.0
protected-mode yes
requirepass redis_secure_pass_2024

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfsync everysec

# Performance
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
logfile ""

# Database
databases 16

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_AQUALUXE_2024"