server {
    listen 80;
    listen [::]:80;
    server_name localhost aqualuxe.local www.aqualuxe.local;
    
    root /var/www/html;
    index index.php index.html index.htm;

    # Security
    server_tokens off;

    # Logging
    access_log /var/log/nginx/aqualuxe_access.log;
    error_log /var/log/nginx/aqualuxe_error.log;

    # WordPress specific rules
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_intercept_errors on;
        fastcgi_pass wordpress:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # Static file handling
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WordPress security
    location ~ /\. {
        deny all;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location ~* wp-config.php {
        deny all;
    }

    location ~ ^/(wp-admin|wp-login\.php) {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # API rate limiting
    location ~ ^/wp-json/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # Block access to sensitive files
    location ~* \.(engine|inc|info|install|make|module|profile|test|po|sh|.*sql|theme|tpl(\.php)?|xtmpl)$|^(\..*|Entries.*|Repository|Root|Tag|Template)$|\.php_
    {
        return 444;
    }

    # Block access to backup and source files
    location ~* \.(old|orig|original|php#|php~|php_bak|save|swo|swp|bak|htaccess)$ {
        return 444;
    }
}

# SSL Configuration (for production)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aqualuxe.local www.aqualuxe.local;

    ssl_certificate /etc/nginx/ssl/aqualuxe.crt;
    ssl_certificate_key /etc/nginx/ssl/aqualuxe.key;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozTLS:10m;
    ssl_session_tickets off;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Include the same configuration as HTTP
    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_intercept_errors on;
        fastcgi_pass wordpress:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }
}