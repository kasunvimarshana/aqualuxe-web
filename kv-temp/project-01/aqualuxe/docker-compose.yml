version: '3.8'

services:
  # WordPress Application
  wordpress:
    image: wordpress:6.4-php8.2-apache
    container_name: aqualuxe_wordpress
    restart: unless-stopped
    environment:
      # Database Configuration
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: aqualuxe_user
      WORDPRESS_DB_PASSWORD: aqualuxe_secure_pass_2024
      WORDPRESS_DB_NAME: aqualuxe_db
      
      # WordPress Configuration
      WORDPRESS_CONFIG_EXTRA: |
        /* AquaLuxe Theme Configuration */
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        
        /* Security Configuration */
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', false);
        define('WP_POST_REVISIONS', 3);
        define('AUTOSAVE_INTERVAL', 300);
        define('WP_MEMORY_LIMIT', '512M');
        
        /* Performance Configuration */
        define('WP_CACHE', true);
        define('COMPRESS_CSS', true);
        define('COMPRESS_SCRIPTS', true);
        define('CONCATENATE_SCRIPTS', false);
        define('ENFORCE_GZIP', true);
        
        /* Redis Configuration */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
    ports:
      - "8080:80"
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/themes/aqualuxe
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./logs:/var/log/apache2
    depends_on:
      - mysql
      - redis
    networks:
      - aqualuxe_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aqualuxe_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass_2024
      MYSQL_DATABASE: aqualuxe_db
      MYSQL_USER: aqualuxe_user
      MYSQL_PASSWORD: aqualuxe_secure_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-config:/etc/mysql/conf.d
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - aqualuxe_network
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=512M

  # phpMyAdmin for Database Management
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: aqualuxe_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: aqualuxe_user
      PMA_PASSWORD: aqualuxe_secure_pass_2024
      MYSQL_ROOT_PASSWORD: root_secure_pass_2024
      UPLOAD_LIMIT: 512M
      MEMORY_LIMIT: 512M
      MAX_EXECUTION_TIME: 600
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - aqualuxe_network

  # Redis for Caching
  redis:
    image: redis:7.2-alpine
    container_name: aqualuxe_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_secure_pass_2024
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - aqualuxe_network

  # Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: aqualuxe_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_secure_pass_2024
      HTTP_USER: admin
      HTTP_PASSWORD: admin_secure_pass_2024
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - aqualuxe_network

  # MailHog for Email Testing
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aqualuxe_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web interface
    networks:
      - aqualuxe_network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:1.25-alpine
    container_name: aqualuxe_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites:/etc/nginx/sites-available
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - wordpress
    networks:
      - aqualuxe_network
    profiles:
      - production

# Volumes for persistent data
volumes:
  wordpress_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

# Network for inter-container communication
networks:
  aqualuxe_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16