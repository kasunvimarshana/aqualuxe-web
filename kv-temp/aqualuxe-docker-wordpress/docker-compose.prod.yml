version: '3.8'

services:
  wordpress:
    build: .
    container_name: aqualuxe_wordpress_prod
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: aqualuxe_user
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: aqualuxe_db
      WORDPRESS_TABLE_PREFIX: aq_
      WORDPRESS_DEBUG: 0
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
        define('WP_CACHE', true);
        define('WP_MEMORY_LIMIT', '512M');
        define('COMPRESS_CSS', true);
        define('COMPRESS_SCRIPTS', true);
        define('CONCATENATE_SCRIPTS', false);
        define('ENFORCE_GZIP', true);
        define('FORCE_SSL_ADMIN', true);
        define('WP_CACHE_KEY_SALT', '${CACHE_KEY_SALT}');
    volumes:
      - wordpress_data:/var/www/html
      - ./themes/aqualuxe-child:/var/www/html/wp-content/themes/aqualuxe-child
      - ./uploads:/var/www/html/wp-content/uploads
    depends_on:
      - mysql
      - redis
    networks:
      - aqualuxe_network

  mysql:
    image: mysql:8.0
    container_name: aqualuxe_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aqualuxe_db
      MYSQL_USER: aqualuxe_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/prod.cnf:/etc/mysql/conf.d/prod.cnf
    networks:
      - aqualuxe_network

  redis:
    image: redis:7-alpine
    container_name: aqualuxe_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - aqualuxe_network

  nginx:
    image: nginx:alpine
    container_name: aqualuxe_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress
    networks:
      - aqualuxe_network

volumes:
  wordpress_data:
  mysql_data:
  redis_data:

networks:
  aqualuxe_network:
    driver: bridge
