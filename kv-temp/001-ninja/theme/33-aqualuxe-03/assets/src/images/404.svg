<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    .text-primary { fill: #00afcc; }
    .text-secondary { fill: #333; }
    .bubble { fill: #e6f7fa; stroke: #00afcc; stroke-width: 2; }
    .fish { fill: #f5b90f; }
    .fish-eye { fill: #333; }
    .fish-fin { fill: #f7c73f; }
    .seaweed { fill: #00af4b; }
  </style>
  
  <!-- Background bubbles -->
  <circle class="bubble" cx="100" cy="100" r="20" opacity="0.7" />
  <circle class="bubble" cx="150" cy="150" r="15" opacity="0.5" />
  <circle class="bubble" cx="200" cy="80" r="10" opacity="0.6" />
  <circle class="bubble" cx="700" cy="120" r="25" opacity="0.7" />
  <circle class="bubble" cx="650" cy="180" r="12" opacity="0.5" />
  <circle class="bubble" cx="600" cy="90" r="18" opacity="0.6" />
  
  <!-- Seaweed -->
  <path class="seaweed" d="M80,400 C100,380 60,360 80,340 C100,320 60,300 80,280 C100,260 60,240 80,220" stroke="#00af4b" stroke-width="4" fill="none" />
  <path class="seaweed" d="M120,400 C140,370 100,340 120,310 C140,280 100,250 120,220" stroke="#00af4b" stroke-width="4" fill="none" />
  <path class="seaweed" d="M700,400 C680,380 720,360 700,340 C680,320 720,300 700,280 C680,260 720,240 700,220" stroke="#00af4b" stroke-width="4" fill="none" />
  <path class="seaweed" d="M660,400 C640,370 680,340 660,310 C640,280 680,250 660,220" stroke="#00af4b" stroke-width="4" fill="none" />
  
  <!-- Fish -->
  <g transform="translate(500, 300) scale(0.8) rotate(-20)">
    <path class="fish" d="M0,0 C30,-30 70,-30 100,0 C70,30 30,30 0,0 Z" />
    <path class="fish-fin" d="M50,-5 L80,-40 L60,-5 Z" />
    <path class="fish-fin" d="M50,5 L80,40 L60,5 Z" />
    <path class="fish-fin" d="M0,0 L-30,0 L-10,20 Z" />
    <circle class="fish-eye" cx="80" cy="-10" r="5" />
  </g>
  
  <g transform="translate(250, 250) scale(0.6) rotate(20)">
    <path class="fish" d="M0,0 C30,-30 70,-30 100,0 C70,30 30,30 0,0 Z" />
    <path class="fish-fin" d="M50,-5 L80,-40 L60,-5 Z" />
    <path class="fish-fin" d="M50,5 L80,40 L60,5 Z" />
    <path class="fish-fin" d="M0,0 L-30,0 L-10,20 Z" />
    <circle class="fish-eye" cx="80" cy="-10" r="5" />
  </g>
  
  <!-- 404 Text -->
  <text x="400" y="180" font-family="'Playfair Display', serif" font-size="120" font-weight="bold" text-anchor="middle" class="text-primary">404</text>
  <text x="400" y="240" font-family="'Montserrat', sans-serif" font-size="24" text-anchor="middle" class="text-secondary">Page Not Found</text>
  <text x="400" y="280" font-family="'Montserrat', sans-serif" font-size="16" text-anchor="middle" class="text-secondary">The page you are looking for might have been removed,</text>
  <text x="400" y="305" font-family="'Montserrat', sans-serif" font-size="16" text-anchor="middle" class="text-secondary">had its name changed, or is temporarily unavailable.</text>
</svg>