<!DOCTYPE html>
<html>
<head>
    <title>Fish Placeholder</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f7f9;
            width: 400px;
            height: 300px;
            overflow: hidden;
        }
        .fish {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 100px;
            background-color: #0073aa;
            opacity: 0.7;
            border-radius: 50% 10% 10% 50%;
        }
        .eye {
            position: absolute;
            top: 30%;
            left: 70%;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
        }
        .tail {
            position: absolute;
            top: 35%;
            left: 90%;
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-left: 30px solid #0073aa;
            border-bottom: 20px solid transparent;
            opacity: 0.7;
        }
        .text {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #333;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="fish">
        <div class="eye"></div>
    </div>
    <div class="tail"></div>
    <div class="text">Fish Image Placeholder</div>
</body>
</html>
