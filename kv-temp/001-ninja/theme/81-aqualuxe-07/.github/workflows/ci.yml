name: CI
on:
  push:
    branches: [ main, master, dev-* ]
  pull_request:
    branches: [ main, master, dev-* ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wp-content/themes/aqualuxe/package.json
      - name: Install deps
        working-directory: wp-content/themes/aqualuxe
        run: npm ci
      - name: Build
        working-directory: wp-content/themes/aqualuxe
        run: npm run build
      - name: PHP Lint
        run: |
          find wp-content/themes/aqualuxe -type f -name "*.php" -print0 | xargs -0 -n1 -P4 php -l
      - name: Install Composer deps
        working-directory: wp-content/themes/aqualuxe
        run: |
          php -v
          curl -sS https://getcomposer.org/installer | php -- --install-dir=. --filename=composer
          php composer install --no-interaction --no-ansi --no-progress
      - name: Run PHPUnit
        working-directory: wp-content/themes/aqualuxe
        run: php vendor/bin/phpunit -c phpunit.xml.dist
