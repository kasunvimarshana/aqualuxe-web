name: Build Theme
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: PHP Syntax Check
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: |
          php -v
          find . -name "*.php" -not -path "./node_modules/*" -print0 | xargs -0 -n1 php -l
      - run: npm ci
      - run: npm run build
      - name: Package theme
        run: |
          mkdir -p dist
          zip -r dist/aqualuxe.zip . -x "node_modules/*" -x "assets/src/*" -x ".git/*" -x ".github/*" -x "tests/*"
      - uses: actions/upload-artifact@v4
        with:
          name: aqualuxe-theme
          path: dist/aqualuxe.zip
