name: CI
on:
  push:
    branches: [ main, dev-* ]
  pull_request:
    branches: [ main, dev-* ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install
        working-directory: wp-content/themes/aqualuxe
      - name: Build assets
        run: npm run build
        working-directory: wp-content/themes/aqualuxe
      - name: Lint PHP (syntax only)
        run: |
          sudo apt-get update && sudo apt-get install -y php-cli
          find wp-content/themes/aqualuxe -name "*.php" -print0 | xargs -0 -I{} php -l {}
