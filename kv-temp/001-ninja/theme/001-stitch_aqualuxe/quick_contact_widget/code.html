<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AquaLuxe Quick Contact</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
    :root {
      --primary-50: #f0f9ff;
      --primary-100: #e0f2fe;
      --primary-200: #bae6fd;
      --primary-300: #7dd3fc;
      --primary-400: #38bdf8;
      --primary-500: #0ea5e9;
      --primary-600: #0284c7;
      --primary-700: #0369a1;
      --primary-800: #075985;
      --primary-900: #0c4a6e;
    }
    body {
      font-family: 'Manrope', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">
<button class="fixed bottom-8 right-8 bg-[var(--primary-600)] text-white p-4 rounded-full shadow-lg hover:bg-[var(--primary-700)] transition-transform transform hover:scale-110 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--primary-600)] z-40" id="contact-fab">
<span class="material-symbols-outlined">support_agent</span>
</button>
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity duration-300" id="contact-modal">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md transform translate-y-10 transition-all duration-300" id="modal-content">
<div class="p-6">
<div class="flex justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">Quick Contact</h2>
<button class="text-gray-400 hover:text-gray-600" id="close-modal">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="space-y-4">
<a class="flex items-center gap-4 p-4 rounded-lg hover:bg-gray-50 transition-colors" href="#">
<div class="flex items-center justify-center size-12 rounded-full bg-[var(--primary-100)] text-[var(--primary-600)]">
<span class="material-symbols-outlined">email</span>
</div>
<span class="text-gray-700 font-medium">Contact Us Page</span>
<span class="material-symbols-outlined text-gray-400 ml-auto">arrow_forward</span>
</a>
<a class="flex items-center gap-4 p-4 rounded-lg hover:bg-gray-50 transition-colors" href="#">
<div class="flex items-center justify-center size-12 rounded-full bg-[var(--primary-100)] text-[var(--primary-600)]">
<span class="material-symbols-outlined">call</span>
</div>
<span class="text-gray-700 font-medium">Call Us</span>
<span class="material-symbols-outlined text-gray-400 ml-auto">arrow_forward</span>
</a>
<a class="flex items-center gap-4 p-4 rounded-lg hover:bg-gray-50 transition-colors" href="#">
<div class="flex items-center justify-center size-12 rounded-full bg-[var(--primary-100)] text-[var(--primary-600)]">
<svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M19.05 4.95C17.22 3.12 14.72 2 12 2C6.48 2 2 6.48 2 12c0 1.99.58 3.83 1.59 5.37L2.1 21.9l4.63-1.54C8.18 21.42 10 22 12 22h.01c5.52 0 9.99-4.47 9.99-9.99c0-2.72-1.12-5.22-2.95-7.05zM12 20h-.01c-1.74 0-3.41-.53-4.8-1.5l-.36-.21l-3.53.94l.96-3.45l-.23-.38c-1.04-1.44-1.58-3.15-1.58-4.91c0-4.41 3.59-8 8-8s8 3.59 8 8c0 4.41-3.59 8-8 8zM17.3 14.3c-.27-.13-1.63-.8-1.89-.9c-.26-.09-.45-.13-.64.13c-.19.26-.71.9-.88 1.08c-.16.18-.32.2-.59.06c-.27-.13-1.15-.42-2.19-1.35c-.81-.73-1.35-1.63-1.5-1.92c-.15-.28-.02-.44.12-.58c.12-.12.26-.32.39-.48c.13-.16.18-.28.26-.46c.09-.19.04-.35-.02-.48c-.06-.13-.59-1.43-.81-1.95c-.22-.52-.44-.45-.6-.45h-.5c-.22 0-.52.06-.79.33c-.27.26-.98.95-1.15 2.25c-.18 1.3.69 2.91.81 3.13c.12.21 1.63 2.5 4.02 3.53c.59.25 1.05.4 1.41.51c.59.18 1.13.16 1.56.1c.48-.07 1.46-.6 1.67-1.18c.21-.58.21-1.08.14-1.18c-.05-.1-.24-.16-.5-.3z"></path></svg>
</div>
<span class="text-gray-700 font-medium">Chat on WhatsApp</span>
<span class="material-symbols-outlined text-gray-400 ml-auto">arrow_forward</span>
</a>
</div>
<div class="mt-6 pt-6 border-t border-gray-200">
<p class="text-lg font-semibold text-gray-800 mb-4">Quick Inquiry</p>
<form>
<textarea class="w-full h-28 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[var(--primary-300)] focus:border-[var(--primary-500)] transition resize-none placeholder-gray-400" placeholder="Your message..."></textarea>
<div class="flex justify-end mt-4">
<button class="bg-[var(--primary-600)] text-white font-bold py-2 px-6 rounded-lg hover:bg-[var(--primary-700)] transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--primary-600)]" type="submit">Send</button>
</div>
</form>
</div>
</div>
</div>
</div>
<script>
    const fab = document.getElementById('contact-fab');
    const modal = document.getElementById('contact-modal');
    const modalContent = document.getElementById('modal-content');
    const closeModalBtn = document.getElementById('close-modal');
    function openModal() {
      modal.classList.remove('opacity-0', 'pointer-events-none');
      modalContent.classList.remove('translate-y-10');
    }
    function closeModal() {
      modal.classList.add('opacity-0', 'pointer-events-none');
      modalContent.classList.add('translate-y-10');
    }
    fab.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    // Close modal on escape key press
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
    // Close modal when clicking outside of it
    modal.addEventListener('click', (e) => {
        if(e.target === modal) {
            closeModal();
        }
    });
  </script>

</body></html>
