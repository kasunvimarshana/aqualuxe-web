<html><head>
<meta charset="utf-8"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope%3Awght%40400%3B500%3B700%3B800&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<title>Stitch Design</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
      :root {
        --primary-color: #1259a1;
      }
      .back-to-top-button {
          position: fixed;
          bottom: 2rem;
          right: 2rem;
          opacity: 0;
          visibility: hidden;
          transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
      }
      .back-to-top-button.visible {
          opacity: 1;
          visibility: visible;
      }
    </style>
</head>
<body class="bg-[#f0f4f8] dark:bg-[#111418]">
<div class="relative min-h-[200vh] dark group/design-root overflow-x-hidden" style='font-family: Manrope, "Noto Sans", sans-serif;'>
<div class="h-[200vh] text-center p-10 dark:text-white">
<h1 class="text-3xl font-bold mb-4">AquaLuxe</h1>
<p class="text-lg">Scroll down to see the button</p>
</div>
<button class="back-to-top-button flex items-center justify-center size-12 bg-[var(--primary-color)] text-white rounded-full shadow-lg hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--primary-color)] dark:focus:ring-offset-[#111418]" id="back-to-top">
<span class="material-symbols-outlined text-3xl">
          keyboard_arrow_up
        </span>
</button>
</div>
<script>
        const backToTopButton = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopButton.classList.add('visible');
            } else {
                backToTopButton.classList.remove('visible');
            }
        });
        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>

</body></html>
