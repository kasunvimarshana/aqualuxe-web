<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope%3Awght%40400%3B500%3B700%3B800&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<title>AquaLuxe - Checkout</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
      :root {
        --primary-color: #0a335c;
        --border-color: #3c4753;
        --background-color: #111418;
        --input-background: #1c2126;
        --text-primary: #ffffff;
        --text-secondary: #9dabb8;
      }
      .progress-indicator span:not(:last-child)::after {
        content: '>';
        margin: 0 0.5rem;
        color: var(--text-secondary);
      }
    </style>
</head>
<body class="bg-background-color text-text-primary" style='font-family: Manrope, "Noto Sans", sans-serif;'>
<div class="relative flex size-full min-h-screen flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-color px-10 py-4">
<div class="flex items-center gap-3 text-white">
<svg class="h-8 w-8 text-primary-color" fill="currentColor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M39.475 21.6262C40.358 21.4363 40.6863 21.5589 40.7581 21.5934C40.7876 21.655 40.8547 21.857 40.8082 22.3336C40.7408 23.0255 40.4502 24.0046 39.8572 25.2301C38.6799 27.6631 36.5085 30.6631 33.5858 33.5858C30.6631 36.5085 27.6632 38.6799 25.2301 39.8572C24.0046 40.4502 23.0255 40.7407 22.3336 40.8082C21.8571 40.8547 21.6551 40.7875 21.5934 40.7581C21.5589 40.6863 21.4363 40.358 21.6262 39.475C21.8562 38.4054 22.4689 36.9657 23.5038 35.2817C24.7575 33.2417 26.5497 30.9744 28.7621 28.762C30.9744 26.5497 33.2417 24.7574 35.2817 23.5037C36.9657 22.4689 38.4054 21.8562 39.475 21.6262ZM4.41189 29.2403L18.7597 43.5881C19.8813 44.7097 21.4027 44.9179 22.7217 44.7893C24.0585 44.659 25.5148 44.1631 26.9723 43.4579C29.9052 42.0387 33.2618 39.5667 36.4142 36.4142C39.5667 33.2618 42.0387 29.9052 43.4579 26.9723C44.1631 25.5148 44.659 24.0585 44.7893 22.7217C44.9179 21.4027 44.7097 19.8813 43.5881 18.7597L29.2403 4.41187C27.8527 3.02428 25.8765 3.02573 24.2861 3.36776C22.6081 3.72863 20.7334 4.58419 18.8396 5.74801C16.4978 7.18716 13.9881 9.18353 11.5858 11.5858C9.18354 13.988 7.18717 16.4978 5.74802 18.8396C4.58421 20.7334 3.72865 22.6081 3.36778 24.2861C3.02574 25.8765 3.02429 27.8527 4.41189 29.2403Z" fill-rule="evenodd"></path>
</svg>
<h1 class="text-2xl font-bold tracking-tight">AquaLuxe</h1>
</div>
<div class="flex items-center gap-6">
<button class="flex items-center gap-2 text-text-primary">
<span class="material-symbols-outlined">shopping_cart</span>
<span>Cart (3)</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBYz1Xve69R6kJ5jElhvQMe85ddrYx6XMCkPoXFIGd_pVAkm_7NUtTihlnqNbodI81dkfYvpEfPfLBUJVJKk0s7ALskkQfYmRnJvGNbhMKue4E6WelYnrcXxYuehBd5lRN-ZQMz79ZmIqBa7DIzsP5B3-BEqLzuKIwQwMrg2bxJZFiZ-k1s8rj_fSZtmCrgPdf8T9PEzfSRUsGQCyGdSXjRmOZIgcFbjrB0K2YZkRX3DvGh0eAtLj4IsSvlMboTKlouiMe9RAGZFaI");'></div>
</div>
</header>
<main class="flex-1 px-4 sm:px-6 lg:px-8 py-12">
<div class="max-w-2xl mx-auto">
<div class="flex items-center justify-center mb-8 progress-indicator">
<span class="text-sm font-medium text-text-secondary">Cart</span>
<span class="text-sm font-bold text-text-primary">Information</span>
<span class="text-sm font-medium text-text-secondary">Payment</span>
<span class="text-sm font-medium text-text-secondary">Review</span>
</div>
<div class="bg-input-background/50 border border-border-color rounded-lg p-6 sm:p-8">
<form action="#" method="POST">
<h2 class="text-xl font-semibold mb-6">Contact Information</h2>
<div class="mb-6">
<label class="block text-sm font-medium text-text-primary mb-2" for="email">Email Address</label>
<input class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-border-color bg-input-background text-primary-color focus:ring-primary-color" id="offers" name="offers" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-medium text-text-primary" for="offers">Email me with news and offers</label>
</div>
</div>
<hr class="my-8 border-border-color"/>
<h2 class="text-xl font-semibold mb-6">Shipping Address</h2>
<div class="grid grid-cols-1 gap-y-6 sm:grid-cols-2 sm:gap-x-4">
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-text-primary mb-2" for="full-name">Full name</label>
<input autocomplete="name" class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="full-name" name="full-name" required="" type="text"/>
</div>
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-text-primary mb-2" for="address">Address</label>
<input autocomplete="street-address" class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="address" name="address" required="" type="text"/>
</div>
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-text-primary mb-2" for="apartment">Apartment, suite, etc. <span class="text-text-secondary">(optional)</span></label>
<input class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="apartment" name="apartment" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-text-primary mb-2" for="city">City</label>
<input autocomplete="address-level2" class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="city" name="city" required="" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-text-primary mb-2" for="country">Country</label>
<select autocomplete="country-name" class="form-select w-full rounded-md border-border-color bg-input-background text-text-primary focus:border-primary-color focus:ring-primary-color" id="country" name="country" required="">
<option>United States</option>
<option>Canada</option>
<option>Mexico</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-text-primary mb-2" for="region">State / Province</label>
<input autocomplete="address-level1" class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="region" name="region" required="" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-text-primary mb-2" for="postal-code">ZIP / Postal code</label>
<input autocomplete="postal-code" class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="postal-code" name="postal-code" required="" type="text"/>
</div>
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-text-primary mb-2" for="phone">Phone</label>
<input autocomplete="tel" class="form-input w-full rounded-md border-border-color bg-input-background text-text-primary placeholder-text-secondary focus:border-primary-color focus:ring-primary-color" id="phone" name="phone" placeholder="+1 (555) 987-6543" required="" type="tel"/>
</div>
</div>
<hr class="my-8 border-border-color"/>
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-border-color bg-input-background text-primary-color focus:ring-primary-color" id="save-info" name="save-info" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-medium text-text-primary" for="save-info">Save this information for next time</label>
</div>
</div>
<div class="mt-8 flex justify-end">
<button class="w-full sm:w-auto flex items-center justify-center rounded-md border border-transparent bg-primary-color px-6 py-3 text-base font-medium text-white shadow-sm hover:bg-opacity-80 focus:outline-none focus:ring-2 focus:ring-primary-color focus:ring-offset-2 focus:ring-offset-background-color" type="submit">
                        Continue to payment
                    </button>
</div>
</form>
</div>
</div>
</main>
</div>

</body></html>
