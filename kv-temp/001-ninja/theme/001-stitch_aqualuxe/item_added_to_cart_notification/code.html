<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AquaLuxe - Item Added to Cart</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
    :root {
      --primary-color: #1980e6;
      --primary-hover-color: #156ac4;
      --secondary-color: #f0f2f4;
      --secondary-hover-color: #e5e7eb;
      --text-primary: #111418;
      --text-secondary: #637588;
      --background-light: #ffffff;
      --border-color: #e5e7eb;
    }
    body {
      font-family: 'Manrope', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 flex items-start justify-end p-8">
<div class="fixed top-8 right-8 w-full max-w-sm" style="font-family: Manrope, sans-serif;">
<div class="relative flex w-full flex-col bg-[var(--background-light)] rounded-xl shadow-2xl overflow-hidden animate-slide-in">
<div class="absolute top-2.5 right-2.5">
<button class="p-1 rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400">
<span class="material-symbols-outlined text-xl">
                  close
              </span>
</button>
</div>
<div class="p-6">
<div class="flex items-center gap-4">
<div class="flex-shrink-0">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-16" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBRWck6RGvdXZmN5peo2UsHs4ZDDTlRd9Rr-ruRqwzpxqWNUZw5aWv7WE8HFtkR0t-YAVvasUc1SN7Z1ndlPEw6EarhXGXUSMaJVkrDfjwBjn0J8Utniiem433BV9BVkvf3OpyxEBLaksXg61BmOyLe72dVQqeE9dyefBK8is87qZ8FAYgqw2M3HTGYqPrpjO-VKM5pRs6yhsHpCteWSeyEb8W0hSV4Anip7MgyF6GHONf-9bMHAJfpqUWZxC6n5wFO5x1GVs8L76E");'></div>
</div>
<div class="flex-1">
<p class="text-[var(--text-primary)] text-base font-semibold leading-tight">Item added to your cart</p>
<p class="text-[var(--text-secondary)] text-sm font-normal leading-normal mt-1">Neon Tetra has been successfully added.</p>
</div>
</div>
<div class="mt-6 flex gap-3">
<button class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-4 bg-[var(--secondary-color)] text-[var(--text-primary)] text-sm font-bold leading-normal tracking-[-0.01em] transition-colors duration-200 hover:bg-[var(--secondary-hover-color)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--primary-color)]">
<span class="truncate">View Cart</span>
</button>
<button class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-4 bg-[var(--primary-color)] text-white text-sm font-bold leading-normal tracking-[-0.01em] transition-colors duration-200 hover:bg-[var(--primary-hover-color)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--primary-color)]">
<span class="truncate">Checkout</span>
</button>
</div>
</div>
<div class="h-1 bg-[var(--primary-color)] animate-progress"></div>
</div>
</div>
<style>
    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slide-in {
      animation: slide-in 0.5s ease-out forwards;
    }
    @keyframes progress {
      from {
        width: 100%;
      }
      to {
        width: 0%;
      }
    }
    .animate-progress {
      animation: progress 5s linear forwards;
    }
  </style>

</body></html>
