<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <!-- Background with water texture -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <pattern id="water-pattern" patternUnits="userSpaceOnUse" width="200" height="200">
      <path d="M0 50C40 50 40 150 80 150C120 150 120 50 160 50C200 50 200 150 240 150" stroke="#0ea5e9" stroke-width="3" fill="none" stroke-opacity="0.2" />
      <path d="M-40 90C0 90 0 190 40 190C80 190 80 90 120 90C160 90 160 190 200 190" stroke="#0ea5e9" stroke-width="3" fill="none" stroke-opacity="0.2" />
      <path d="M-40 30C0 30 0 130 40 130C80 130 80 30 120 30C160 30 160 130 200 130" stroke="#0ea5e9" stroke-width="3" fill="none" stroke-opacity="0.2" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg-gradient)" />
  <rect width="1200" height="900" fill="url(#water-pattern)" />
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="#ffffff" fill-opacity="0.9" />
  
  <!-- Logo -->
  <g transform="translate(50, 30)">
    <text font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0ea5e9">AquaLuxe</text>
  </g>
  
  <!-- Navigation -->
  <g transform="translate(600, 50)">
    <text font-family="Arial, sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" x="0">Home</text>
    <text font-family="Arial, sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" x="100">Shop</text>
    <text font-family="Arial, sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" x="200">Services</text>
    <text font-family="Arial, sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" x="300">About</text>
    <text font-family="Arial, sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" x="400">Contact</text>
  </g>
  
  <!-- Hero Section -->
  <rect x="100" y="150" width="1000" height="400" rx="10" fill="#ffffff" fill-opacity="0.9" />
  
  <!-- Hero Content -->
  <g transform="translate(150, 250)">
    <text font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#0c4a6e">Premium Ornamental</text>
    <text font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#0c4a6e" y="70">Fish Collection</text>
    <text font-family="Arial, sans-serif" font-size="20" fill="#64748b" y="120">Discover our exclusive selection of rare and exotic</text>
    <text font-family="Arial, sans-serif" font-size="20" fill="#64748b" y="150">ornamental fish for your luxury aquarium.</text>
    
    <!-- CTA Button -->
    <rect x="0" y="200" width="200" height="60" rx="30" fill="#0ea5e9" />
    <text font-family="Arial, sans-serif" font-size="20" fill="#ffffff" x="50" y="240">Shop Now</text>
  </g>
  
  <!-- Fish Illustration -->
  <g transform="translate(750, 300)">
    <path d="M200,50 C240,30 280,20 320,30 C340,35 350,50 350,70 C350,90 340,105 320,110 C280,120 240,110 200,90 C180,80 170,65 170,50 C170,35 180,20 200,10 Z" fill="#0ea5e9" fill-opacity="0.8" />
    <circle cx="300" cy="60" r="10" fill="#ffffff" />
    <path d="M170,50 C150,30 120,20 80,20 C60,20 40,30 20,50 L50,50 L40,70 L60,60 L55,80 L75,65 L80,85 L95,70 L105,85 L115,65 L130,80 L135,60 L170,50 Z" fill="#0ea5e9" fill-opacity="0.6" />
  </g>
  
  <!-- Featured Products Section -->
  <text font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#0c4a6e" x="600" y="600" text-anchor="middle">Featured Products</text>
  
  <!-- Product Cards -->
  <g transform="translate(150, 650)">
    <!-- Product 1 -->
    <rect width="250" height="200" rx="10" fill="#ffffff" />
    <rect width="250" height="120" rx="10" fill="#0ea5e9" fill-opacity="0.3" />
    <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0c4a6e" x="20" y="150">Betta Fish</text>
    <text font-family="Arial, sans-serif" font-size="16" fill="#64748b" x="20" y="175">$29.99</text>
  </g>
  
  <g transform="translate(450, 650)">
    <!-- Product 2 -->
    <rect width="250" height="200" rx="10" fill="#ffffff" />
    <rect width="250" height="120" rx="10" fill="#0ea5e9" fill-opacity="0.3" />
    <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0c4a6e" x="20" y="150">Goldfish</text>
    <text font-family="Arial, sans-serif" font-size="16" fill="#64748b" x="20" y="175">$19.99</text>
  </g>
  
  <g transform="translate(750, 650)">
    <!-- Product 3 -->
    <rect width="250" height="200" rx="10" fill="#ffffff" />
    <rect width="250" height="120" rx="10" fill="#0ea5e9" fill-opacity="0.3" />
    <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0c4a6e" x="20" y="150">Guppy Fish</text>
    <text font-family="Arial, sans-serif" font-size="16" fill="#64748b" x="20" y="175">$14.99</text>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="900" width="1200" height="0" fill="#0c4a6e" />
</svg>