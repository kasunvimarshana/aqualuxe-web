name: CI
on:
  push:
    branches: [ main, master, dev-* ]
  pull_request:
    branches: [ main, master, dev-* ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wp-content/themes/aqualuxe/package.json
      - name: Install deps
        working-directory: wp-content/themes/aqualuxe
        run: npm ci
      - name: Build
        working-directory: wp-content/themes/aqualuxe
        run: npm run build
