<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Work+Sans%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<title>AquaLuxe Checkout</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
      :root {
        --primary-50: #f0f9ff;
        --primary-100: #e0f2fe;
        --primary-200: #bae6fd;
        --primary-300: #7dd3fc;
        --primary-400: #38bdf8;
        --primary-500: #11b4d4;
        --primary-600: #0284c7;
        --primary-700: #0369a1;
        --primary-800: #075985;
        --primary-900: #0c4a6e;
      }
    </style>
</head>
<body class="bg-gray-50 text-gray-800" style='font-family: "Work Sans", "Noto Sans", sans-serif;'>
<div class="relative flex size-full min-h-screen flex-col group/design-root overflow-x-hidden">
<header class="bg-white shadow-sm">
<div class="container mx-auto px-4 lg:px-10">
<div class="flex items-center justify-between whitespace-nowrap border-b border-gray-200 py-4">
<div class="flex items-center gap-3">
<div class="text-[var(--primary-500)]">
<svg class="h-8 w-8" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"></path>
<path d="M12 17.27l-5.32 2.73 1.02-5.93-4.3-4.19 5.95-.86L12 3.64l2.65 5.38 5.95.86-4.3 4.19 1.02 5.93z" fill-opacity="0.5"></path>
<path d="M12 12c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z" transform="scale(0.8) translate(3,3)"></path>
</svg>
</div>
<h1 class="text-2xl font-bold tracking-tight text-gray-900">AquaLuxe</h1>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium text-gray-600 hover:text-[var(--primary-500)] transition-colors" href="#">Shop</a>
<a class="text-sm font-medium text-gray-600 hover:text-[var(--primary-500)] transition-colors" href="#">About</a>
<a class="text-sm font-medium text-gray-600 hover:text-[var(--primary-500)] transition-colors" href="#">Contact</a>
</div>
<div class="flex items-center gap-4">
<button class="relative rounded-full p-2 text-gray-600 hover:bg-gray-100 hover:text-[var(--primary-500)] transition-colors focus:outline-none focus:ring-2 focus:ring-[var(--primary-500)] focus:ring-offset-2">
<span class="material-symbols-outlined"> shopping_bag </span>
<span class="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-[var(--primary-500)] text-xs font-bold text-white">3</span>
</button>
<button class="md:hidden rounded-full p-2 text-gray-600 hover:bg-gray-100 hover:text-[var(--primary-500)] transition-colors focus:outline-none focus:ring-2 focus:ring-[var(--primary-500)] focus:ring-offset-2">
<span class="material-symbols-outlined"> menu </span>
</button>
</div>
</div>
</div>
</header>
<main class="flex-1 bg-[#f8fbfc] py-12 sm:py-16 lg:py-20">
<div class="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8">
<div class="flex items-center">
<a class="text-sm font-medium text-[var(--primary-600)] hover:text-[var(--primary-500)]" href="#">Cart</a>
<span class="mx-2 text-sm text-gray-400">/</span>
<span class="text-sm font-medium text-gray-700">Checkout</span>
</div>
<div class="mt-8 text-center">
<h2 class="text-3xl font-extrabold tracking-tight text-gray-900 sm:text-4xl">Checkout</h2>
<p class="mt-2 text-base text-gray-500">Streamlined for your convenience and security.</p>
</div>
<div class="mt-12">
<div>
<p class="text-sm font-medium text-gray-700">Step 1 of 4: Billing Details</p>
<div class="mt-2 overflow-hidden rounded-full bg-gray-200">
<div class="h-2 rounded-full bg-[var(--primary-500)]" style="width: 25%;"></div>
</div>
</div>
<div class="mt-10 bg-white p-6 sm:p-8 rounded-lg shadow-md">
<h3 class="text-lg font-semibold leading-6 text-gray-900">Billing Information</h3>
<div class="mt-6 grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
<div class="sm:col-span-6">
<label class="block text-sm font-medium text-gray-700" for="full-name">Full Name</label>
<div class="mt-1">
<input class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="full-name" name="full-name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="sm:col-span-3">
<label class="block text-sm font-medium text-gray-700" for="email">Email address</label>
<div class="mt-1">
<input class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="email" name="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<div class="sm:col-span-3">
<label class="block text-sm font-medium text-gray-700" for="phone-number">Phone Number</label>
<div class="mt-1">
<input class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="phone-number" name="phone-number" placeholder="+1 (555) 987-6543" type="tel"/>
</div>
</div>
<div class="sm:col-span-6">
<label class="block text-sm font-medium text-gray-700" for="address">Address</label>
<div class="mt-1">
<input class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="address" name="address" placeholder="185 Berry St." type="text"/>
</div>
</div>
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-gray-700" for="city">City</label>
<div class="mt-1">
<input class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="city" name="city" placeholder="San Francisco" type="text"/>
</div>
</div>
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-gray-700" for="country">Country</label>
<div class="mt-1">
<select class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="country" name="country">
<option>United States</option>
<option>Canada</option>
<option>Mexico</option>
</select>
</div>
</div>
<div class="sm:col-span-2">
<label class="block text-sm font-medium text-gray-700" for="postal-code">ZIP / Postal code</label>
<div class="mt-1">
<input class="block w-full rounded-md border-gray-300 shadow-sm focus:border-[var(--primary-500)] focus:ring-[var(--primary-500)] sm:text-sm" id="postal-code" name="postal-code" placeholder="94103" type="text"/>
</div>
</div>
</div>
<div class="mt-8 flex justify-end">
<button class="flex w-full sm:w-auto items-center justify-center rounded-md border border-transparent bg-[var(--primary-500)] py-3 px-8 text-base font-medium text-white shadow-sm hover:bg-[var(--primary-600)] focus:outline-none focus:ring-2 focus:ring-[var(--primary-500)] focus:ring-offset-2 transition-colors" type="submit">
                  Continue to Shipping
                </button>
</div>
</div>
</div>
</div>
</main>
</div>

</body></html>
