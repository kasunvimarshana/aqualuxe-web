# CI/CD Pipeline Steps (e.g., for GitHub Actions)

name: WordPress Theme CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install npm dependencies
      run: npm install

    - name: Build assets
      run: npm run prod

    - name: Lint PHP
      uses: overtrue/phplint@3.0
      with:
        path: .

    - name: Run PHPUnit tests
      run: |
        # This is a placeholder. You would need to set up a proper WordPress testing environment.
        # docker-compose up -d
        # vendor/bin/phpunit
        echo "PHPUnit tests would run here."

    - name: Package theme
      run: |
        mkdir -p aqualuxe
        rsync -av --progress . aqualuxe --exclude-from=.distignore
        zip -r aqualuxe.zip aqualuxe
    
    - name: Upload artifact
      uses: actions/upload-artifact@v2
      with:
        name: aqualuxe-theme
        path: aqualuxe.zip
