<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AquaLuxe underwater gradient fallback">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#021d2e"/>
      <stop offset="100%" stop-color="#05334f"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence baseFrequency="0.8" numOctaves="1" seed="2" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.3"/>
  <g opacity="0.15">
    <circle cx="200" cy="900" r="80" fill="#7dd3fc"/>
    <circle cx="400" cy="820" r="50" fill="#43bccd"/>
    <circle cx="700" cy="950" r="40" fill="#bde0fe"/>
  </g>
</svg>
