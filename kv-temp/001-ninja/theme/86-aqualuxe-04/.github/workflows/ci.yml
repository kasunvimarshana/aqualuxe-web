name: CI
on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Lint
        run: |
          find . -type f -name "*.php" -print0 | xargs -0 -I{} php -l {}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        working-directory: wp-content/themes/aqualuxe
        run: npm ci || npm install
      - name: Build assets
        working-directory: wp-content/themes/aqualuxe
        run: npm run build
